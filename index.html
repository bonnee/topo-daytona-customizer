<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gauge Cluster Mockup</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="app-container">
        <aside class="controls">
            <div class="controls-header">
                <h2>Customization</h2>
                <div class="controls-actions">
                    <button id="refresh-gauges">Refresh</button>
                    <button id="export-config">Export Config</button>
                    <button id="export-image">Export PNG</button>
                </div>
            </div>

            <section>
                <h3>Dial Material</h3>
                <select id="dial-material">
                    <!-- Options populated by script.js -->
                </select>
            </section>

            <section>
                <h3>Needle Cap Material</h3>
                <select id="cap-material">
                    <!-- Options populated by script.js -->
                </select>
                <input type="color" id="cap-color" value="#ffffff">
            </section>

            <section>
                <h3>Needle Color</h3>
                <input type="color" id="needle-color" value="#ff0000">
            </section>

            <section>
                <h3>Silkscreen Color</h3>
                <input type="color" id="silkscreen-color" value="#ffffff">
            </section>

            <section>
                <h3>Embossing Finish</h3>
                <select id="embossing-material">
                    <!-- Options populated by script.js -->
                </select>
                <input type="color" id="embossing-color" value="#d0d0d0">
            </section>
        </aside>

        <main class="preview">
            <div id="gauge-cluster" class="gauge-cluster">
                <!-- Gauges will be rendered here by script.js -->
            </div>
        </main>
    </div>
    <script src="https://unpkg.com/html-to-image@1.11.11/dist/html-to-image.js"></script>
    <script src="script.js"></script>
</body>

</html>
